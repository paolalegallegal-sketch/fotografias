<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotografia</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#111;
      color:white;
    }

    header{
      background:#000;
      padding:20px;
      text-align:center;
    }

    header h1{
      font-size:40px;
    }

    nav{
      margin-top:10px;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin:0 15px;
      font-size:18px;
    }

    nav a:hover{
      color:#00bfff;
    }

    .banner{
      height:400px;
      background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200') center/cover;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
    }

    .banner h2{
      font-size:50px;
      background:rgba(0,0,0,0.5);
      padding:20px;
      border-radius:10px;
    }

    .galeria{
      padding:40px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
    }

    .galeria img{
      width:100%;
      border-radius:10px;
      transition:0.3s;
    }

    .galeria img:hover{
      transform:scale(1.05);
    }

    footer{
      text-align:center;
      padding:20px;
      background:#000;
      margin-top:20px;
    }

  </style>
</head>
<body>

  <header>
    <h1>Meu Site de Fotografia</h1>

    <nav>
      <a href="#">Início</a>
      <a href="#">Galeria</a>
      <a href="#">Sobre</a>
      <a href="#">Contato</a>
    </nav>
  </header>

  <section class="banner">
    <h2>Capturando Momentos</h2>
  </section>

  <section class="galeria">

    <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=800" alt="Foto">

    <img src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0?q=80&w=800" alt="Foto">

    <img src="https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=800" alt="Foto">

    <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=800" alt="Foto">

  </section>

  <footer>
    <p>© 2026 Meu Site de Fotografia</p>
  </footer>

</body>
</html>
